<h2>白天一句英文，晚上一句英文，不一样</h2>
<p class="subtitle">白天用什么样的英文？几个方向你看看</p>

<div class="cards">

  <div class="card" data-choice="pinyin" onclick="toggleSelect(this)">
    <div class="card-image" style="background:#f7f5f0;padding:36px 32px;display:flex;flex-direction:column;align-items:center;gap:12px">
      <div style="width:52px;height:52px;border-radius:50%;background:conic-gradient(#c4a882 0deg 252deg, #e8e0d4 252deg 360deg)"></div>
      <div style="font-size:22px;font-weight:400;color:#5a4a3a;letter-spacing:4px">七分</div>
      <div style="font-size:11px;color:#a09080;letter-spacing:2px">QĪ FĒN</div>
    </div>
    <div class="card-body">
      <h3>像 D 一样 · 拼音</h3>
      <p style="color:var(--muted)">跟 D 的原始设计一样，白天用拼音标注，晚上用英文。够简洁。</p>
    </div>
  </div>

  <div class="card" data-choice="justright" onclick="toggleSelect(this)">
    <div class="card-image" style="background:#f7f5f0;padding:36px 32px;display:flex;flex-direction:column;align-items:center;gap:12px">
      <div style="width:52px;height:52px;border-radius:50%;background:conic-gradient(#c4a882 0deg 252deg, #e8e0d4 252deg 360deg)"></div>
      <div style="font-size:22px;font-weight:400;color:#5a4a3a;letter-spacing:4px">七分</div>
      <div style="font-size:11px;color:#a09080;letter-spacing:2px">JUST RIGHT</div>
    </div>
    <div class="card-body">
      <h3>JUST RIGHT</h3>
      <p style="color:var(--muted)">"刚刚好"的英文表达。白天看到它，提醒自己"吃七分饱就好"。跟晚上的"EAT WELL · LIVE WELL"形成递进。</p>
    </div>
  </div>

  <div class="card" data-choice="mindful" onclick="toggleSelect(this)">
    <div class="card-image" style="background:#f7f5f0;padding:36px 32px;display:flex;flex-direction:column;align-items:center;gap:12px">
      <div style="width:52px;height:52px;border-radius:50%;background:conic-gradient(#c4a882 0deg 252deg, #e8e0d4 252deg 360deg)"></div>
      <div style="font-size:22px;font-weight:400;color:#5a4a3a;letter-spacing:4px">七分</div>
      <div style="font-size:11px;color:#a09080;letter-spacing:2px">EAT MINDFULLY</div>
    </div>
    <div class="card-body">
      <h3>EAT MINDFULLY</h3>
      <p style="color:var(--muted)">"正念饮食"——呼应"懂你"和"觉察"的产品态度。比 JUST RIGHT 多一点内涵。</p>
    </div>
  </div>

</div>

<p class="subtitle" style="text-align:center;margin-top:12px">如果这里都没有，你也可以自己给一个英文词</p>
