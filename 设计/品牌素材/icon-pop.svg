<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <pattern id="dots" patternUnits="userSpaceOnUse" width="8" height="8">
      <rect width="8" height="8" fill="#FFD700"/>
      <circle cx="4" cy="4" r="2.5" fill="#FF6B6B"/>
    </pattern>
  </defs>
  <rect width="200" height="200" fill="url(#dots)" rx="40"/>
  <!-- white speech bubble -->
  <rect x="25" y="35" width="150" height="110" rx="20" fill="white" stroke="#111" stroke-width="4"/>
  <polygon points="65,145 85,165 105,145" fill="white" stroke="#111" stroke-width="4"/>
  <polygon points="65,145 85,165 105,145" fill="white"/>
  <!-- 七 in bold comic style -->
  <text x="100" y="120" text-anchor="middle" font-family="system-ui, sans-serif" 
    font-size="72" font-weight="900" fill="#111" letter-spacing="0" transform="skewX(-8)">七分</text>
  <!-- exclamation -->
  <text x="140" y="95" font-family="system-ui" font-size="28" font-weight="900" fill="#FF6B6B">!</text>
  <!-- stars -->
  <text x="35" y="55" font-size="16" fill="#FF6B6B">★</text>
  <text x="155" y="150" font-size="12" fill="#FF6B6B">★</text>
  <text x="25" y="170" font-size="14" fill="#4ECDC4">◆</text>
</svg>
