<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="utf-8"><title>七分 · 创意图标</title>
<style>
  body { font-family: system-ui, sans-serif; background:#111; display:flex; flex-direction:column; align-items:center; padding:40px; }
  h1 { color:#e8d5a3; font-weight:300; letter-spacing:6px; font-size:20px; margin-bottom:40px; }
  .grid { display:flex; gap:40px; flex-wrap:wrap; justify-content:center; }
  .card { text-align:center; width:200px; }
  .card img { width:200px; height:200px; border-radius:28px; display:block; box-shadow:0 4px 30px rgba(0,0,0,0.3); }
  .label { color:#fff; font-size:11px; letter-spacing:2px; margin-top:12px; opacity:0.7; }
  .desc { color:#888; font-size:10px; margin-top:4px; }
</style>
</head>
<body>
  <h1>七分 · 小程序图标概念</h1>
  <div class="grid">
    <div class="card">
      <img src="icon-mascot.png" alt="角色版">
      <div class="label">🎭 角色版 · 拟人化</div>
      <div class="desc">70% 圆环做光环，可爱食物精灵</div>
    </div>
    <div class="card">
      <img src="icon-pop.png" alt="波普版">
      <div class="label">🎨 波普版 · 漫画风</div>
      <div class="desc">亮黄底色+波点，comic 气泡</div>
    </div>
    <div class="card">
      <img src="icon-ink.png" alt="水墨版">
      <div class="label">🖌 水墨版 · 东方美学</div>
      <div class="desc">书法笔触+朱红印章</div>
    </div>
    <div class="card">
      <img src="icon-geo.png" alt="几何版">
      <div class="label">△ 几何版 · 极简艺术</div>
      <div class="desc">黑金几何，70% 扇形切割</div>
    </div>
  </div>
</body>
</html>
