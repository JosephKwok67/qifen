<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#f7f5f0" rx="40"/>
  <!-- halo -->
  <circle cx="100" cy="95" r="72" fill="none" stroke="#e8e0d4" stroke-width="3"
    stroke-dasharray="317 136" transform="rotate(-90 100 95)"/>
  <!-- head -->
  <circle cx="100" cy="95" r="48" fill="#c4a882"/>
  <!-- left eye -->
  <ellipse cx="82" cy="88" rx="10" ry="12" fill="white"/>
  <ellipse cx="85" cy="87" rx="5" ry="7" fill="#3a2a1a"/>
  <circle cx="87" cy="84" r="2" fill="white"/>
  <!-- right eye -->
  <ellipse cx="118" cy="88" rx="10" ry="12" fill="white"/>
  <ellipse cx="115" cy="87" rx="5" ry="7" fill="#3a2a1a"/>
  <circle cx="113" cy="84" r="2" fill="white"/>
  <!-- blush -->
  <ellipse cx="70" cy="105" rx="8" ry="5" fill="#e8b4b4" opacity="0.6"/>
  <ellipse cx="130" cy="105" rx="8" ry="5" fill="#e8b4b4" opacity="0.6"/>
  <!-- mouth -->
  <path d="M90 108 Q100 120 110 108" fill="none" stroke="#3a2a1a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- text -->
  <text x="100" y="172" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" 
    font-size="22" font-weight="500" fill="#5a4a3a" letter-spacing="4">七分</text>
</svg>
