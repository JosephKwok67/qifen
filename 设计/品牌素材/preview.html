<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="utf-8"><title>七分 · Logo 预览</title>
<style>
  body { font-family: system-ui, sans-serif; background: #f5f3ee; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; gap: 40px; flex-wrap: wrap; padding: 40px; }
  .card { background: #fff; border-radius: 20px; padding: 40px; text-align: center; box-shadow: 0 2px 20px rgba(0,0,0,0.06); }
  .card h2 { margin: 0 0 20px; font-weight: 400; color: #555; font-size: 14px; letter-spacing: 2px; }
  .card img { max-width: 200px; height: auto; display: block; margin: 0 auto; border-radius: 12px; }
  .card p { margin-top: 20px; font-size: 12px; color: #999; }
</style>
</head>
<body>
  <div class="card">
    <h2>☀️ 白天版</h2>
    <img src="logo-daytime.png" alt="七分 白天版">
    <p>EAT REAL · FEEL REAL</p>
  </div>
  <div class="card">
    <h2>🌙 夜晚版</h2>
    <img src="logo-nighttime.png" alt="七分 夜晚版">
    <p>EAT WELL · LIVE WELL</p>
  </div>
  <div class="card">
    <h2>🔵 符号</h2>
    <img src="logo-symbol.png" alt="七分 符号">
    <p>70% 圆环</p>
  </div>
  <div class="card">
    <h2>📱 小程序图标</h2>
    <img src="logo-icon.png" alt="七分 小程序图标">
    <p>正方形 · 适合做头像/图标</p>
  </div>
</body>
</html>
